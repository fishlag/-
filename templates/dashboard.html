<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生管理系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f5f7fa;padding:30px}
        .container{max-width:900px;margin:0 auto}
        .card{background:white;padding:25px;border-radius:12px;box-shadow:0 2px 10px #00000010}
        h1{margin-bottom:20px;color:#333}
        .add{display:inline-block;background:#67c23a;color:white;padding:10px 16px;border-radius:8px;text-decoration:none;margin-bottom:15px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #eee}
        th{background:#f8f9fa}
        .edit{color:#409eff;text-decoration:none}
        .del{color:#f56c6c;text-decoration:none}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>学生列表</h1>
        <a href="/add" class="add">➕ 添加新学生</a>
        <table>
            <tr>
                <th>姓名</th>
                <th>学号</th>
                <th>成绩</th>
                <th>操作</th>
            </tr>
            {% for s in students %}
            <tr>
                <td>{{s.name}}</td>
                <td>{{s.student_id}}</td>
                <td>{{s.score}}</td>
                <td>
                    <a href="/edit/{{s.id}}" class="edit">编辑</a> |
                    <a href="/delete/{{s.id}}" class="del" onclick="return confirm('确定删除？')">删除</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
</body>
</html>
