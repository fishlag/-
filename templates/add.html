<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>添加学生</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f5f7fa;padding:30px}
        .box{max-width:500px;margin:0 auto;background:white;padding:30px;border-radius:12px;box-shadow:0 2px 10px #00000010}
        h1{margin-bottom:20px}
        input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
        button{padding:12px 20px;background:#409eff;color:white;border:none;border-radius:8px;margin-top:10px}
    </style>
</head>
<body>
<div class="box">
    <h1>添加新学生</h1>
    <form method="post">
        <input name="name" placeholder="姓名" required>
        <input name="student_id" placeholder="学号" required>
        <input name="score" placeholder="成绩" required>
        <button>保存</button>
    </form>
</div>
</body>
</html>
