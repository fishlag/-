<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f5f7fa;padding:50px}
        .box{max-width:400px;margin:0 auto;background:white;padding:30px;border-radius:12px;box-shadow:0 2px 10px #00000010}
        h1{margin-bottom:20px;color:#333}
        input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
        button{width:100%;padding:12px;background:#409eff;color:white;border:none;border-radius:8px;margin-top:10px}
        .tips{margin-top:15px;color:#666}
        .red{color:red}
    </style>
</head>
<body>
<div class="box">
    <h1>登录</h1>
    <form method="post">
        <input name="username" placeholder="用户名" required>
        <input type="password" name="password" placeholder="密码" required>
        <button>登录</button>
    </form>
    <p class="tips">没有账号？<a href="/register">去注册</a></p>
    {% for msg in get_flashed_messages() %}
        <p class="red">{{msg}}</p>
    {% endfor %}
</div>
</body>
</html>
